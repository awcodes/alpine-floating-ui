<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpine.js Floating UI</title>
    <script type="module">
      import FloatingUI from "/dist/module.esm.js";

      document.addEventListener("alpine:init", () => {
        FloatingUI(window.Alpine);
      });
    </script>
    <script src="//unpkg.com/alpinejs" defer></script>

    <style>
      .component {
        position: relative;
      }

      .panel {
        display: none;
        position: absolute;
        background: #222;
        color: white;
        font-weight: bold;
        padding: 5px;
        border-radius: 4px;
        font-size: 90%;
        z-index: 20;
      }

      .arrow {
        position: absolute;
        background: inherit;
        width: 8px;
        height: 8px;
        transform: rotate(45deg);
      }

      main {
        padding-top: 300px;
      }

      button {
        font-size: 1.5rem;
      }
    </style>
  </head>

  <body>
    <main>

      <div class="component" x-data="floater()">
        <button x-bind="trigger">Click over me!</button>
        <div x-bind="panel" class="panel">I'm floating</div>
      </div>

      <!-- <div id="component" x-data>
        <button @click="$float($refs.panel, {offset: 10})">Click over me!</button>
        <div x-ref="panel" id="panel">I'm floating</div>
      </div>

      <div id="component" x-data>
        <button
          @click="$float($refs.panel, {
          offset: 10,
          arrow: {
            element: $refs.arrow
          }
        })"
        >
          Click over me!
        </button>
        <div x-ref="panel" id="panel">
          I'm floating 2!
          <div x-ref="arrow" id="arrow"></div>
        </div>
      </div> -->
    </main>
  </body>
</html>
